front:
  text: 仁王護國般若經疏神寶記序易於通經難於作記欺佛也易於作記難於通經欺祖也愚於佛祖之道不敢欺而或有述焉亦各適其緣爾先是經疏始播於日本卒授於海舶其教法之隆污往來之艱險如此朝文元公之後景迂先生之序詳矣方今聖君賢相主盟宗教之秋顧此經法實為國寶而獨得未記述為教門缺典一日昭慶講者行彬抱負是書謁余於靈山賓次作而曰願得一記發揮余謝不敏不得已挾以東歸暇日馨爐啓卷三復其旨顧謂或者曰難矣乎非所敢知也抑又年運衰矣學荒志索於此豈能及哉或者勉之曰此亦宗教一盛事使見義不為惡得為勇乎余曰諾姑試圖之未敢以為善也成目之曰神寶記云惟通人有以訂之庶為他日奉行之張本耳紹定庚寅中元日善月序
